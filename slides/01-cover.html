<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>David Randulfe — Cover</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="../tokens.css">
  <style>
    .cover {
      background-image: url('../assets/bg/fondos-10.jpg');
      background-size: cover;
      background-position: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 80px 160px;
      gap: 56px;
    }

    .cover__header img {
      height: 52px;
      width: auto;
    }

    .cover__title {
      font-family: var(--iw-font);
      font-weight: 800;
      font-size: 112px;
      line-height: 1.02;
      letter-spacing: -0.035em;
      color: var(--iw-dark);
      margin: 0;
      max-width: 1300px;
    }
    .cover__title .iw-hl {
      color: var(--iw-primary);
      display: block;
      margin-top: 8px;
    }
  </style>
</head>
<body>
<div class="iw-stage">
  <section class="iw-slide cover">

    <header class="cover__header">
      <img src="../assets/logos/randulfe-34.png" alt="David Randulfe">
    </header>

    <h1 class="cover__title">
      Hola, soy
      <span class="iw-hl">David Randulfe</span>
    </h1>

  </section>
</div>
</body>
</html>
